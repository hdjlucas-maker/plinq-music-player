<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NanoPlay — Player de Música</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="titlebar">
    <span class="logo">NANOPLAY</span>
    <span class="dots"><span></span><span></span><span></span></span>
  </div>

  <div class="lcd">
    <div class="track-name empty" id="track-name">Nenhuma música carregada</div>
    <div class="meta-row">
      <span class="time" id="current-time">00:00</span>
      <span id="track-counter">0 / 0</span>
      <span class="time" id="duration-time">00:00</span>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="visualizer" id="visualizer"></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn toggle" id="shuffle-btn" title="Aleatório" aria-label="Ativar modo aleatório">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 3h4v4M21 3l-7 7M3 21l6-6M3 7h4l10 10h4M3 17h4l3.5-3.5"/></svg>
    </button>
    <button class="ctrl-btn" id="prev-btn" title="Anterior" aria-label="Música anterior">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19,5 19,19 11,12"/><rect x="5" y="5" width="2" height="14"/></svg>
    </button>
    <button class="ctrl-btn play" id="play-btn" title="Reproduzir" aria-label="Reproduzir ou pausar">
      <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
    </button>
    <button class="ctrl-btn" id="next-btn" title="Próxima" aria-label="Próxima música">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,5 5,19 13,12"/><rect x="17" y="5" width="2" height="14"/></svg>
    </button>
    <button class="ctrl-btn toggle" id="repeat-btn" title="Repetir" aria-label="Ativar repetição">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 01-4 4H3"/></svg>
    </button>
  </div>

  <div class="volume-row">
    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
  </div>

  <div class="playlist-section">
    <div class="playlist-header">
      <h2>Playlist</h2>
      <div class="add-buttons-row">
        <label class="add-files-btn" for="file-input" id="add-files-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 5v14M5 12h14"/></svg>
          Adicionar músicas
        </label>
        <label class="add-files-btn secondary" for="folder-input" id="add-folder-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
          Adicionar pasta
        </label>
      </div>
      <input type="file" id="file-input" accept="audio/*" multiple>
      <input type="file" id="folder-input" webkitdirectory multiple>
    </div>

    <ul class="playlist" id="playlist">
    </ul>

    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <div>Sua playlist está vazia.<br>Toque em "Adicionar músicas" e escolha arquivos do seu dispositivo (MP3, FLAC, WAV, M4A, OGG, AAC).</div>
    </div>
  </div>

  <div class="footer-section">
    <div class="footer-note">
      Toca apenas arquivos do seu dispositivo. <strong>Sem anúncios, sem internet, sem cadastro.</strong>
    </div>
    <div class="like-row">
      <button class="like-btn" id="like-btn" aria-pressed="false">
        <svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg>
        Curtir
      </button>
      <span class="like-count" id="like-count">0</span>
    </div>
  </div>
</div>

<audio id="audio-el" preload="metadata"></audio>

<script src="script.js"></script>
</body>
</html>
